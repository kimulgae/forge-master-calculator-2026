<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>길드전 점수 심화 계산기</title>
    <link rel="stylesheet" href="guildwar.css">
</head>
<body>

    <nav class="top-nav">
        <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
        <span class="nav-title">FMcalc</span>
    </nav>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <a href="index.html" class="sidebar-link active">🚀 승천 계산기</a>
        <a href="guildwar.html" class="sidebar-link">⚔️ 길드전 계산기</a>
    </div>
    
    <div class="container">
        <header>
            <h1>길드전 점수 심화 계산기</h1>
            <p></p>
        </header>

        <div class="category-card">
            <div class="category-title forge">
                <span>대장간 (Forge) 상세 설정</span>
            </div>
            
            <div class="input-grid three-col">
                <div class="input-group">
                    <label>시작 대장간 레벨 (1~35)</label>
                    <input type="number" id="forge-level" value="1" min="1" max="35" oninput="calculateGuildWar()">
                </div>
                <div class="input-group">
                    <label>보유 망치 개수 (총량)</label>
                    <input type="text" id="forge-hammers" value="0" placeholder="예: 30k" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
                <div class="input-group">
                    <label>1회 두드리기 소모 망치 수</label>
                    <input type="number" id="forge-cost" value="1" min="1" oninput="calculateGuildWar()">
                </div>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>보유 코인 (k, m 단위 입력)</label>
                    <input type="text" id="coins-owned" value="0" placeholder="예: 2.12m" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
                <div class="input-group">
                    <label>보유 보석 (스킵용)</label>
                    <input type="text" id="gems-owned" value="0" placeholder="예: 10k" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="use-gems" checked onchange="calculateGuildWar()">
                <label for="use-gems">보석으로 시간 스킵 허용 (체크 해제 시 한 단계 칸만 채우고 멈춤)</label>
            </div>

            <div class="prob-box">
                <h4>최종 도달 레벨에 따른 자동 획득 확률 (%)</h4>
                <div class="prob-grid">
                    <div class="input-group">
                        <label>하위 등급 (1점)</label>
                        <input type="text" id="prob-1" value="0.00%" readonly style="background-color: transparent; border: none; color: var(--text-muted);">
                    </div>
                    <div class="input-group">
                        <label>중위 등급 (2점)</label>
                        <input type="text" id="prob-2" value="0.00%" readonly style="background-color: transparent; border: none; color: var(--text-muted);">
                    </div>
                    <div class="input-group">
                        <label>상위 등급 (3점)</label>
                        <input type="text" id="prob-3" value="0.00%" readonly style="background-color: transparent; border: none; color: var(--text-muted);">
                    </div>
                </div>
            </div>

            <div class="result-row" style="flex-direction: column; align-items: flex-start; gap: 12px; background-color: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3);">
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <span class="result-label" style="color: var(--text-main);">업그레이드 상태</span>
                    <span class="result-value" id="res-forge-status" style="color: var(--accent-blue); font-size: 15px;">-</span>
                </div>
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <span class="result-label" style="color: var(--text-main);">소모 내역</span>
                    <span class="result-value" id="res-forge-spent" style="font-size: 13px; color: var(--text-muted); font-weight: 500; text-align: right;">-</span>
                </div>
            </div>

            <div class="result-row">
                <span class="result-label">대장간 총 예상 점수</span>
                <span class="result-value" id="res-forge">0 점</span>
            </div>
        </div>

        <div class="category-card">
            <div class="category-title skill">
                <span>스킬 (Skills) 재화 계산</span>
            </div>
            
            <div class="input-grid">
                <div class="input-group">
                    <label>보유 스킬 뽑기 재화</label>
                    <input type="text" id="skill-owned" value="0" placeholder="예: 30k" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
                <div class="input-group">
                    <label>스킬 5회 소환 비용</label>
                    <input type="number" id="skill-cost" value="200" min="1" oninput="calculateGuildWar()">
                </div>
            </div>

            <div class="result-row">
                <span class="result-label">스킬 총 예상 점수</span>
                <span class="result-value" id="res-skill">0 점</span>
            </div>
        </div>

        <div class="category-card">
            <div class="category-title pet">
                <span>탈것 & 펫 재화 계산</span>
            </div>
            
            <div class="input-grid three-col">
                <div class="input-group">
                    <label>보유 탈것 뽑기 재화</label>
                    <input type="text" id="mount-owned" value="0" placeholder="예: 10k" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
                <div class="input-group">
                    <label>탈것 1회 소환 비용</label>
                    <input type="number" id="mount-cost" value="50" min="1" oninput="calculateGuildWar()">
                </div>
                <div class="input-group">
                    <label>추가 획득 확률(추탈) %</label>
                    <input type="number" id="mount-ext" value="0" min="0" oninput="calculateGuildWar()">
                </div>
            </div>

            <div class="input-grid three-col">
                <div class="input-group">
                    <label>보유 펫(알) 뽑기 재화</label>
                    <input type="text" id="pet-owned" value="0" placeholder="예: 20k" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
                <div class="input-group">
                    <label>펫 1회 소환 비용</label>
                    <input type="number" id="pet-cost" value="100" min="1" oninput="calculateGuildWar()">
                </div>
                <div class="input-group">
                    <label>추가 획득 확률(추탈) %</label>
                    <input type="number" id="pet-ext" value="0" min="0" oninput="calculateGuildWar()">
                </div>
            </div>

            <div class="result-row">
                <span class="result-label">탈것 + 펫 총 점수</span>
                <span class="result-value" id="res-pet">0 점</span>
            </div>
        </div>
    </div>

    <div class="total-sticky-bar">
        <div class="total-box">
            <span class="total-title">최종 예상 획득 점수</span>
            <span class="total-score" id="grand-total">0 점</span>
        </div>
    </div>

    <script src="guildwar.js"></script>
</body>
</html>
