<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>길드전 점수 심화 계산기</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="guildwar.css">
</head>
<body>

    <nav class="top-nav">
        <div style="display: flex; align-items: center;">
            <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
            <span class="nav-title">포마 종합 계산기</span>
        </div>

        <div class="top-right-auth">
            <button id="login-btn-top" onclick="signInWithGoogle()" class="top-login-btn">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span>로그인</span>
            </button>

            <div id="user-info-top" style="display: none; position: relative;">
                <img id="profile-img" src="" alt="프로필" onclick="toggleProfileMenu()" class="profile-avatar">
                <div id="profile-menu-top" class="profile-dropdown">
                    <div class="dropdown-header">
                        <span style="font-size: 0.8rem; color: #949ba4;">사용자</span><br>
                        <strong id="user-name-top" style="font-size: 1.1rem; color: #fff;"></strong>
                    </div>
                    <ul class="dropdown-list">
                        <li onclick="location.href='settings.html'">⚙️ 프로필 설정</li>
                        <div class="dropdown-divider"></div>
                        <li onclick="signOut()">🚪 로그아웃</li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <a href="index.html" class="sidebar-link">🚀 승천 계산기</a>
        <a href="guildwar.html" class="sidebar-link active">⚔️ 길드전 계산기</a>
    </div>
    
    <div class="container">
        <header>
            <h1>길드전 점수 계산기</h1>
            <p></p>
        </header>

        <div class="category-card">
            <div class="category-title forge">
                <span>대장간 (Forge) 상세 설정</span>
            </div>
            
            <div class="input-grid three-col">
                <div class="input-group">
                    <label>시작 대장간 레벨 (1~35)</label>
                    <input type="number" id="forge-level"placeholder="1" data-default="1" onfocus="this.placeholder=''" onblur="this.placeholder='1'" min="1" max="35" oninput="calculateGuildWar()">
                </div>
                <div class="input-group">
                    <label>보유 망치 개수 (총량)</label>
                    <input type="text" id="forge-hammers" placeholder="1" data-default="1" onfocus="this.placeholder=''" onblur="this.placeholder='1'" placeholder="예: 30k" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
                 <div class="input-group">
                    <label>무료 망치 확률 (%)</label>
                    <input type="number" id="free-hammer" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'" min="0" oninput="calculateGuildWar()">
                </div>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label>보유 코인 (k, m 단위 입력)</label>
                    <input type="text" id="coins-owned" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'" placeholder="예: 2.12m" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
                <div class="input-group">
                    <label>보유 보석 (스킵용)</label>
                    <input type="text" id="gems-owned" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'" placeholder="예: 10k" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="use-gems" checked onchange="calculateGuildWar()">
                <label for="use-gems">보석으로 시간 스킵 허용 (체크 해제 시 한 단계 칸만 채우고 멈춤)</label>
            </div>

            <div class="prob-box">
                <h4>최종 도달 레벨에 따른 자동 획득 확률 (%)</h4>
                <div class="prob-grid">
                    <div class="input-group">
                        <label>하위 등급 (1점)</label>
                        <input type="text" id="prob-1" value="0.00%" readonly style="background-color: transparent; border: none; color: var(--text-muted);">
                    </div>
                    <div class="input-group">
                        <label>중위 등급 (2점)</label>
                        <input type="text" id="prob-2" value="0.00%" readonly style="background-color: transparent; border: none; color: var(--text-muted);">
                    </div>
                    <div class="input-group">
                        <label>상위 등급 (3점)</label>
                        <input type="text" id="prob-3" value="0.00%" readonly style="background-color: transparent; border: none; color: var(--text-muted);">
                    </div>
                </div>
            </div>

            <div class="result-row" style="flex-direction: column; align-items: flex-start; gap: 12px; background-color: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3);">
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <span class="result-label" style="color: var(--text-main);">업그레이드 상태</span>
                    <span class="result-value" id="res-forge-status" style="color: var(--accent-blue); font-size: 15px;">-</span>
                </div>
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <span class="result-label" style="color: var(--text-main);">소모 내역</span>
                    <span class="result-value" id="res-forge-spent" style="font-size: 13px; color: var(--text-muted); font-weight: 500; text-align: right;">-</span>
                </div>
            </div>

            <div class="result-row">
                <span class="result-label">대장간 총 예상 점수</span>
                <span class="result-value" id="res-forge">0 점</span>
            </div>
        </div>

        <div class="category-card">
            <div class="category-title skill">
                <span>스킬 (Skills) 재화 계산</span>
            </div>
            
            <div class="input-grid">
                <div class="input-group">
                    <label>보유 스킬 뽑기 재화</label>
                    <input type="text" id="skill-owned" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'" placeholder="예: 30k" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
                <div class="input-group">
                    <label>스킬 5회 소환 비용</label>
                    <input type="number" id="skill-cost" placeholder="200" data-default="200" onfocus="this.placeholder=''" onblur="this.placeholder='200'"" min="1" oninput="calculateGuildWar()">
                </div>
            </div>

            <div class="result-row">
                <span class="result-label">스킬 총 예상 점수</span>
                <span class="result-value" id="res-skill">0 점</span>
            </div>
        </div>

        <div class="category-card">
            <div class="category-title pet">
                <span>탈것 & 펫 재화 계산</span>
            </div>
            
            <div class="input-grid three-col">
                <div class="input-group">
                    <label>보유 탈것 뽑기 재화</label>
                    <input type="text" id="mount-owned" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'" placeholder="예: 10k" oninput="calculateGuildWar()" onkeyup="formatInput(this)">
                </div>
                <div class="input-group">
                    <label>탈것 1회 소환 비용</label>
                    <input type="number" id="mount-cost" placeholder="50" data-default="50" onfocus="this.placeholder=''" onblur="this.placeholder='50'" min="0" oninput="calculateGuildWar()">
                </div>
                <div class="input-group">
                    <label>추가 획득 확률(추탈) %</label>
                    <input type="number" id="mount-ext" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'" min="0" oninput="calculateGuildWar()">
                </div>
            </div>
            <div class="result-row">
                <span class="result-label">탈것 총 점수</span>
                <span class="result-value" id="res-pet">0 점</span>
            </div>
        </div>
    </div>

    <div class="total-sticky-bar">
        <div class="total-box">
            <span class="total-title">최종 예상 획득 점수</span>
            <span class="total-score" id="grand-total">0 점</span>
        </div>
    </div>

    <script src="guildwar.js"></script>
</body>
</html>
