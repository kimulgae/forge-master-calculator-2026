<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PvP 승률 계산기 - 포마 종합 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* PvP 페이지 전용 다크모드 커스텀 CSS */
        .upload-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }
        .upload-section {
            background-color: #2b2d31;
            border: 2px dashed #4f545c;
            padding: 20px;
            border-radius: 10px;
            transition: border-color 0.2s;
        }
        .upload-section:hover {
            border-color: #7289da;
        }
        .upload-section h3 {
            margin-top: 0;
            color: #3498db;
            border-bottom: 1px solid #3f4147;
            padding-bottom: 10px;
        }
        .opponent-title {
            color: #e74c3c !important;
        }
        input[type="file"] {
            color: #949ba4;
            font-size: 0.9rem;
            cursor: pointer;
        }
        input[type="file"]::file-selector-button {
            background-color: #4f545c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            transition: background-color 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background-color: #686d76;
        }
        
        canvas { 
            border: 1px solid #3f4147; 
            margin-top: 5px; 
            max-width: 100%; 
            border-radius: 6px; 
            background-color: #1e1f22;
        }
        .crop-item { margin-bottom: 15px; }
        .crop-label { font-weight: bold; color: #bdc3c7; margin: 0; font-size: 13px; }
        .image-set-title { color: #f1c40f; background: #1e1f22; padding: 5px 10px; border-radius: 4px; margin-top: 20px; font-size: 14px;}
        
        /* 결과창 커스텀 */
        .pvp-result {
            margin-top: 25px; 
            padding: 20px; 
            background-color: #2b2d31; 
            border: 2px solid #2ecc71; 
            border-radius: 10px; 
            text-align: center;
        }
        .stat-grid {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            color: #dcddde;
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- 상단 네비게이션바 -->
    <nav class="top-nav">
        <div style="display: flex; align-items: center;">
            <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
            <span class="nav-title">포마 종합 계산기</span>
        </div>
        <div class="top-right-auth">
            <button id="login-btn-top" onclick="signInWithGoogle()" class="top-login-btn"><span>로그인</span></button>
            <div id="user-info-top" style="display: none; position: relative;">
                <img id="profile-img" src="" alt="프로필" onclick="toggleProfileMenu()" class="profile-avatar">
                <div id="profile-menu-top" class="profile-dropdown">
                    <div class="dropdown-header">
                        <span style="font-size: 0.8rem; color: #949ba4;">사용자</span><br>
                        <strong id="user-name-top" style="font-size: 1.1rem; color: #fff;"></strong>
                    </div>
                    <ul class="dropdown-list">
                        <li onclick="location.href='settings.html'">⚙️ 프로필 설정</li>
                        <div class="dropdown-divider"></div>
                        <li onclick="signOut()">🚪 로그아웃</li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- 사이드바 -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <a href="index.html" class="sidebar-link">🚀 승천 계산기</a>
        <a href="guildwar.html" class="sidebar-link">⚔️ 길드전 계산기</a>
        <a href="offline.html" class="sidebar-link">💤 오프라인 & 대장간</a>
        <a href="pvp.html" class="sidebar-link active">⚔️ PvP 승률 계산기</a>
        <a href="settings.html" class="sidebar-link">⚙️ 프로필 설정</a>
    </div>

    <!-- 메인 컨텐츠 -->
    <div class="container">
        <h1>⚔️ PvP 승률 계산기</h1>
        <p class="subtitle">스크린샷을 업로드하여 상대방과의 승률을 시뮬레이션 하세요.</p>

        <div class="upload-wrapper">
            <!-- 1. 내 캐릭터 영역 -->
            <div class="card active" style="display: block;">
                <div class="upload-section">
                    <h3>🛡️ 내 캐릭터 스펙 (다중 선택 가능)</h3>
                    <input type="file" id="myUpload" accept="image/png, image/jpeg" multiple style="width: 100%; margin-bottom: 15px;">
                    <div id="myContainer"></div>
                </div>
            </div>

            <!-- 2. 상대방 영역 -->
            <div class="card active" style="display: block; border-top-color: #e74c3c;">
                <div class="upload-section" style="border-color: #e74c3c44;">
                    <h3 class="opponent-title">🔥 상대방 스펙 (다중 선택 가능)</h3>
                    <input type="file" id="oppUpload" accept="image/png, image/jpeg" multiple style="width: 100%; margin-bottom: 15px;">
                    <div id="oppContainer"></div>
                </div>
            </div>
        </div>

        <button id="calcButton" class="calc-btn" style="margin-top: 10px;">⚔️ AI 이미지 분석 및 승률 계산하기</button>
        <div id="finalResultContainer"></div>
    </div>

    <script>
        // 사이드바 토글 (기존 호환용)
        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('show'); 
            document.getElementById('sidebar-overlay').classList.toggle('show'); 
        }
        function toggleProfileMenu() { document.getElementById('profile-menu-top').classList.toggle('show'); }

        // 전역 변수
        let myCroppedDataList = [];
        let oppCroppedDataList = [];

        const regions = {
            "1_상단_전투력": [0.1, 0.15, 0.8, 0.13],
            "2_중단_장비칸": [0.1, 0.40, 0.8, 0.17],
            "3_중단_스킬펫": [0.1, 0.57, 0.8, 0.07],
            "4_하단_상세스탯": [0.1, 0.63, 0.8, 0.15]
        };

        function processSingleImage(file, container, index) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const w = img.width;
                        const h = img.height;
                        const tempCropped = {};

                        const title = document.createElement('h4');
                        title.className = 'image-set-title';
                        title.textContent = `📸 [${index + 1}번째 스크린샷]`;
                        container.appendChild(title);

                        for (const [name, ratio] of Object.entries(regions)) {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const sx = w * ratio[0], sy = h * ratio[1];
                            const sWidth = w * ratio[2], sHeight = h * ratio[3];

                            canvas.width = sWidth;
                            canvas.height = sHeight;
                            ctx.drawImage(img, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);

                            const cropItem = document.createElement('div');
                            cropItem.className = 'crop-item';
                            cropItem.innerHTML = `<p class="crop-label">${name}</p>`;
                            cropItem.appendChild(canvas);
                            container.appendChild(cropItem);

                            tempCropped[name] = canvas.toDataURL('image/jpeg', 0.5);
                        }
                        resolve(tempCropped);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function handleMultipleUpload(inputId, containerId, isMine) {
            document.getElementById(inputId).addEventListener('change', async function(e) {
                const files = e.target.files;
                if (!files || files.length === 0) return;

                const container = document.getElementById(containerId);
                container.innerHTML = `<p style="color: #2ecc71; font-weight: bold;">✅ 총 ${files.length}장 분석 준비 완료</p>`;
                
                const tempDataList = [];
                for (let i = 0; i < files.length; i++) {
                    const croppedData = await processSingleImage(files[i], container, i);
                    tempDataList.push(croppedData);
                }

                if (isMine) myCroppedDataList = tempDataList;
                else oppCroppedDataList = tempDataList;
            });
        }

        handleMultipleUpload('myUpload', 'myContainer', true);
        handleMultipleUpload('oppUpload', 'oppContainer', false);

        const calcButton = document.getElementById('calcButton');
        calcButton.onclick = async () => {
            if (myCroppedDataList.length === 0 || oppCroppedDataList.length === 0) {
                alert("내 캐릭터와 상대방 캐릭터의 스크린샷을 최소 1장 이상씩 업로드해주세요!");
                return;
            }

            try {
                calcButton.textContent = "⏳ 계산중... (수 초 정도 소요될 수 있습니다)";
                calcButton.style.backgroundColor = "#e67e22";
                calcButton.disabled = true;

                const API_URL = 'https://imageai-beta-self.vercel.app/api/calculate';
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        myImages: myCroppedDataList,
                        opponentImages: oppCroppedDataList 
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`[서버 상태 코드: ${response.status}] 상세 내용: ${errorText.substring(0, 100)}...`);
                }

                const result = await response.json();
                const resultContainer = document.getElementById('finalResultContainer');
                
                if (result.success) {
                    resultContainer.innerHTML = `
                        <div class="pvp-result">
                            <h3 style="color: #2ecc71; margin-top:0;">🏆 분석 완료!</h3>
                            <div class="stat-grid">
                                <div><strong style="color:#3498db;">내 최종 스탯:</strong><br>${result.myCalculated?.finalEfficiency || '계산 대기'}</div>
                                <div><strong style="color:#e74c3c;">상대방 최종 스탯:</strong><br>${result.opponentCalculated?.finalEfficiency || '계산 대기'}</div>
                            </div>
                            <hr style="border-top: 1px dashed #4f545c; margin: 20px 0;">
                            <h2 style="color: #f1c40f; margin-bottom:0; font-size: 1.8rem;">🔥 1,000회 모의전 예상 승률: ${result.winRate}%</h2>
                        </div>
                    `;
                } else {
                    alert("서버 에러: " + (result.error || "알 수 없는 오류가 발생했습니다."));
                }
            } catch (error) {
                alert("통신 에러 발생!\n\n" + error.message);
            } finally {
                calcButton.textContent = "⚔️ AI 이미지 분석 및 승률 계산하기";
                calcButton.style.backgroundColor = "#2ecc71";
                calcButton.disabled = false;
            }
        };

        // 로그인 세션 연동 로직 (필요 시 활성화)
        const SUPABASE_URL = 'https://exoghsmbjaehcsjakrij.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b2doc21iamFlaGNzamFrcmlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNzc2OTUsImV4cCI6MjA5Njc1MzY5NX0.Kq8VJ_QDQkN0xOWhdJyEC3hfwaHyOs_LPUHcQrIbb_s';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        supabaseClient.auth.onAuthStateChange((event, session) => {
            const user = session?.user;
            if (user) {
                document.getElementById('login-btn-top').style.display = 'none';
                document.getElementById('user-info-top').style.display = 'block';
                document.getElementById('profile-img').src = user.user_metadata.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                document.getElementById('user-name-top').innerText = user.user_metadata.full_name || '용사';
            } else {
                document.getElementById('login-btn-top').style.display = 'flex';
                document.getElementById('user-info-top').style.display = 'none';
            }
        });
        async function signInWithGoogle() { await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/pvp.html' } }); }
        async function signOut() { await supabaseClient.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
