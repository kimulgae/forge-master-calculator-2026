<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포마 승천 통합 계산기</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { font-family: 'Pretendard', sans-serif; background-color: #313338; color: #dbdee1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        h1 { color: #ffffff; text-align: center; margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { color: #949ba4; text-align: center; margin-bottom: 25px; font-size: 0.95rem; }
        
        /* 메인 카테고리 탭 */
        .nav-buttons { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { flex: 1; min-width: 120px; padding: 14px; background-color: #5865F2; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.05rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-btn.active { background-color: #3c45a5; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4); }

        /* 계산 모드 스위치 */
        .mode-switch { display: flex; background: #1e1f22; border-radius: 8px; overflow: hidden; margin-bottom: 20px; border: 1px solid #3f4147; }
        .mode-label { flex: 1; text-align: center; padding: 14px; cursor: pointer; color: #949ba4; font-weight: bold; font-size: 1rem; transition: 0.2s; position: relative; }
        .mode-label input { position: absolute; opacity: 0; cursor: pointer; }
        .mode-label.active { background: #2ecc71; color: #1e1f22; }

        .card { background-color: #2b2d31; border-radius: 12px; padding: 25px; border-top: 4px solid #5865F2; display: none; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card.active { display: block; }
        #card-skill { border-top-color: #e74c3c; }
        #card-pet { border-top-color: #f1c40f; }
        #card-mount { border-top-color: #9b59b6; }
        #card-forge { border-top-color: #e67e22; }

        .card h2 { margin-top: 0; color: #ffffff; border-bottom: 1px solid #3f4147; padding-bottom: 15px; margin-bottom: 20px; font-size: 1.3rem; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.95rem; font-weight: 600; color: #b5bac1; }
        .input-group input { width: 100%; padding: 12px; background-color: #1e1f22; border: 1px solid #1e1f22; border-radius: 8px; color: #dbdee1; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        .input-group input:focus { outline: none; border-color: #5865F2; }
        .input-group input::placeholder { color: #5c5f66; }
        .full-width { grid-column: span 2; }
        
        .calc-btn { width: 100%; padding: 16px; background-color: #2ecc71; color: #1e1f22; border: none; border-radius: 8px; font-weight: bold; font-size: 1.15rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2); }
        .calc-btn:hover { background-color: #27ae60; }
        
        .result-box { margin-top: 25px; padding: 20px; background-color: #1e1f22; border-radius: 8px; border-left: 4px solid #5865F2; display: none; line-height: 1.8; font-size: 1.05rem; }
        .result-box strong { color: #5865F2; font-size: 1.15rem; }

        .rarity-container { margin-top: 25px; display: none; }
        .rarity-title { margin-bottom: 12px; font-weight: bold; color: #fff; font-size: 1.1rem; border-bottom: 1px solid #3f4147; padding-bottom: 8px; }
        .rarity-table { display: grid; gap: 6px; }
        .rarity-row { display: flex; justify-content: space-between; padding: 10px 14px; border-radius: 6px; font-weight: 800; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>포마 승천 통합 계산기</h1>
    <p class="subtitle">모든 데이터 및 보유 재화 기반 연산 통합 버전</p>

    <div class="mode-switch">
        <label class="mode-label active" id="lbl-target">
            <input type="radio" name="calcMode" value="target" checked onchange="toggleMode()">
            <span>🎯 목표 레벨 기준</span>
        </label>
        <label class="mode-label" id="lbl-curr">
            <input type="radio" name="calcMode" value="curr" onchange="toggleMode()">
            <span>💰 보유 재화 기준</span>
        </label>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="btn-skill" onclick="tab('skill')">🎟️ 스킬</button>
        <button class="nav-btn" id="btn-pet" onclick="tab('pet')">🥚 알</button>
        <button class="nav-btn active" id="btn-mount" onclick="tab('mount')">🗝️ 탈것</button>
        <button class="nav-btn" id="btn-forge" onclick="tab('forge')">⚒️ 대장간</button>
    </div>

    <div id="card-skill" class="card">
        <h2>🎟️ 스킬 승천 계산기</h2>
        <div class="input-grid">
            <div class="input-group"><label>현재 레벨</label><input type="number" id="s-cur" value="1"></div>
            <div class="input-group"><label>진행도 (사용한 횟수)</label><input type="number" id="s-prog" value="0"></div>
            <div class="input-group mode-target"><label>목표 레벨</label><input type="number" id="s-tar" value="37"></div>
            <div class="input-group mode-curr" style="display:none;"><label>보유 재화 (k 입력 가능)</label><input type="text" id="s-curr" value="30k" placeholder="예: 30000, 30k"></div>
            <div class="input-group full-width"><label>5회 소환 비용</label><input type="number" id="s-cost" value="160"></div>
        </div>
        <button class="calc-btn" onclick="calc('skill')">계산하기</button>
        <div class="result-box" id="res-skill"></div>
        <div class="rarity-container" id="rarity-skill"></div>
    </div>

    <div id="card-pet" class="card">
        <h2>🥚 알 승천 계산기</h2>
        <div class="input-grid">
            <div class="input-group"><label>현재 레벨</label><input type="number" id="p-cur" value="1"></div>
            <div class="input-group"><label>추가 획득 확률(추탈) %</label><input type="number" id="p-ext" value="0"></div>
            <div class="input-group"><label>진행도 (사용한 횟수)</label><input type="number" id="p-prog" value="0"></div>
            <div class="input-group mode-target"><label>목표 레벨</label><input type="number" id="p-tar" value="37"></div>
            <div class="input-group mode-curr full-width" style="display:none;"><label>보유 재화 (k 입력 가능)</label><input type="text" id="p-curr" value="30k" placeholder="예: 30000, 30k"></div>
        </div>
        <button class="calc-btn" onclick="calc('pet')">계산하기</button>
        <div class="result-box" id="res-pet"></div>
        <div class="rarity-container" id="rarity-pet"></div>
    </div>

    <div id="card-mount" class="card active">
        <h2>🗝️ 탈것 승천 계산기</h2>
        <div class="input-grid">
            <div class="input-group"><label>현재 레벨</label><input type="number" id="m-cur" value="1"></div>
            <div class="input-group"><label>추가 획득 확률(추탈) %</label><input type="number" id="m-ext" value="25"></div>
            <div class="input-group"><label>진행도 (사용한 횟수)</label><input type="number" id="m-prog" value="0"></div>
            <div class="input-group"><label>1회 소환 비용</label><input type="number" id="m-cost" value="35"></div>
            <div class="input-group full-width mode-target"><label>목표 레벨</label><input type="number" id="m-tar" value="37"></div>
            <div class="input-group full-width mode-curr" style="display:none;"><label>보유 재화 (k입력 가능)</label><input type="text" id="m-curr" value="30k" placeholder="예: 30000, 30k"></div>
        </div>
        <button class="calc-btn" onclick="calc('mount')">계산하기</button>
        <div class="result-box" id="res-mount"></div>
        <div class="rarity-container" id="rarity-mount"></div>
    </div>

    <div id="card-forge" class="card">
        <h2>⚒️ 대장간 승천 계산기</h2>
        <div class="input-grid">
            <div class="input-group"><label>현재 레벨</label><input type="number" id="f-cur" value="1"></div>
            <div class="input-group"><label>비용 감소율(비감) %</label><input type="number" id="f-dis" value="0"></div>
            <div class="input-group"><label>시간 감소율(시감) %</label><input type="number" id="f-spd" value="0"></div>
            <div class="input-group mode-target"><label>목표 레벨 (Max 36)</label><input type="number" id="f-tar" value="35"></div>
            <div class="input-group full-width mode-curr" style="display:none;"><label>보유 코인 (k, m, b 입력 가능)</label><input type="text" id="f-curr" value="1.5m" placeholder="예: 1500000, 1.5m"></div>
        </div>
        <button class="calc-btn" onclick="calcForge()">계산하기</button>
        <div class="result-box" id="res-forge"></div>
        <div class="rarity-container" id="rarity-forge"></div>
    </div>
</div>

    // ============================================
    let currentMode = 'target';
    
    window.onload = () => {
        // 엔터키 즉시 연산 바인딩
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const activeCard = document.querySelector('.card.active');
                    if(activeCard) activeCard.querySelector('.calc-btn').click();
                }
            });
        });
    };

    // 문자열 숫자 파싱 함수 (k, m, b, t 단위 지원)
    function parseCurrency(value) {
        if (!value) return 0;
        let str = value.toString().toLowerCase().replace(/,/g, '').trim();
        let num = parseFloat(str);
        if (isNaN(num)) return 0;
        if (str.endsWith('k')) return num * 1000;
        return num;
    }

    // 모드 탭 전환

        currentMode = document.querySelector('input[name="calcMode"]:checked').value;
        document.querySelectorAll('.mode-label').forEach(l => l.classList.remove('active'));
        document.getElementById(currentMode === 'target' ? 'lbl-target' : 'lbl-curr').classList.add('active');
        
        document.querySelectorAll('.mode-target').forEach(el => el.style.display = currentMode === 'target' ? 'block' : 'none');

        // 모드 변경 시 기존 결과창 초기화
        document.querySelectorAll('.result-box').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.rarity-container').forEach(el => el.style.display = 'none');

        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));

    // ============================================
    // 3. UI 및 포맷팅 유틸리티
    // ============================================
    const RarityNames = ['일반', '희귀', '서사', '전설', '궁극', '신화'];
    const RarityColors = ['#FAFB04', '#6EB504', '#46FAAA', '#FAFA5A', '#FA465A', '#B44704'];
    const ForgeNames = ['원시', '중세', '근대', '현대', '우주', '성간', '다중우주', '양자', '지하세계', '신성'];
    const ForgeColors = ['#F1F1F1', '#5DD8FF', '#5CFF8A', '#FDFF5D', '#FF5D5D', '#D55DFF', '#75FFEE', '#7D5DFF', '#B07879', '#FF9E0D'];

    function getContrastYIQ(hexcolor){
        hexcolor = hexcolor.replace("#", "");
        var r = parseInt(hexcolor.substr(0,2),16);
        var g = parseInt(hexcolor.substr(2,2),16);
        var b = parseInt(hexcolor.substr(4,2),16);
        var yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? '#000000' : '#ffffff';
    }

    function formatNum(n) {
        if (n >= 1e9) return (n/1e9).toFixed(2).replace(/\.00$/, '') + 'B';
        if (n >= 1e6) return (n/1e6).toFixed(2).replace(/\.00$/, '') + 'M';
        if (n >= 1e3) return (n/1e3).toFixed(2).replace(/\.00$/, '') + 'K';
        return n.toLocaleString();
    }

    function formatTime(s) {
        if (s <= 0) return "0분";
        let d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
        let res = [];
        if (d > 0) res.push(`${d}일`);
        if (h > 0) res.push(`${h}시간`);
        if (m > 0 || res.length === 0) res.push(`${m}분`);
        return res.join(' ');
    }

    function drawRarity(targetId, level, probData, names, colors) {
        let box = document.getElementById(targetId);
        let idx = Math.min(level - 1, probData.length - 1);
        let probs = probData[idx];
        
        let html = `<div class="rarity-title">도달 레벨(${level}) 기준 출현 확률</div><div class="rarity-table">`;
        for (let i = 0; i < probs.length; i++) {
            if (probs[i] > 0) {
                let textColor = getContrastYIQ(colors[i]);
                html += `<div class="rarity-row" style="background-color:${colors[i]}; color:${textColor}">
                            <span>${names[i]} ☆</span>
                            <span>${probs[i].toFixed(2)}%</span>
                         </div>`;
            }
        }
        html += '</div>';
        box.innerHTML = html;
        box.style.display = 'block';
    }

    // ============================================
    // 4. 핵심 계산 로직 (모드 분기 처리)
    // ============================================
    function calc(type) {
        let res = document.getElementById('res-' + type);
        res.style.display = 'block';
        document.getElementById('rarity-' + type).style.display = 'none';

        let cur = val(`${type.charAt(0)}-cur`);
        let prog = val(`${type.charAt(0)}-prog`);
        let isTarget = currentMode === 'target';
        
        if (cur <= 0) return res.innerHTML = `<span style="color:#ed4245; font-weight:bold;">현재 레벨을 올바르게 입력하세요.</span>`;

        if (type === 'skill') {
            let costPer5 = val('s-cost');
            
            if (isTarget) {
                let tar = val('s-tar');
                if (cur >= tar) return res.innerHTML = `<span style="color:#ed4245; font-weight:bold;">목표 레벨은 현재 레벨보다 커야 합니다.</span>`;
                
                let total = 0;
                for (let i = cur - 1; i < tar - 1; i++) total += (i < skillData.length ? skillData[i] : 110);
                total = Math.max(0, total - prog);
                let cost = Math.ceil(total / 5) * costPer5;
                
                res.innerHTML = `[목표 ${tar}레벨] 필요 소환: <strong>${total.toLocaleString()}회</strong><br>예상 소모 비용: <strong>${formatNum(cost)}</strong> (5회 ${costPer5} 기준)`;
                drawRarity('rarity-skill', tar, skillRarity, RarityNames, RarityColors);
            } else {
                let curr = parseCurrency(document.getElementById('s-curr').value);
                let pullsAvail = Math.floor(curr / costPer5) * 5;
                let totalAvail = pullsAvail + prog;
                
                let level = cur;
                let needNext = (level - 1 < skillData.length ? skillData[level - 1] : 110);
                
                while (totalAvail >= needNext && level < 200) {
                    totalAvail -= needNext;
                    level++;
                    needNext = (level - 1 < skillData.length ? skillData[level - 1] : 110);
                }
                res.innerHTML = `[보유 재화 소진 시] 도달 가능 최대 레벨: <strong>${level}레벨</strong><br>남은 횟수(진행도): <strong>${Math.floor(totalAvail)} / ${needNext}</strong>`;
                drawRarity('rarity-skill', level, skillRarity, RarityNames, RarityColors);
            }
            
        } else if (type === 'pet') {
            let ext = val('p-ext');
            
            if (isTarget) {
                let tar = val('p-tar');
                if (cur >= tar) return res.innerHTML = `<span style="color:#ed4245; font-weight:bold;">목표 레벨은 현재 레벨보다 커야 합니다.</span>`;
                
                let total = 0;
                for (let i = cur - 1; i < tar - 1; i++) total += (i < petData.length ? petData[i] : 23);
                total = Math.max(0, total - prog);
                let exp = Math.ceil(total / (1 + ext / 100));
                
                res.innerHTML = `[목표 ${tar}레벨] 순수 필요 소환: <strong>${total.toLocaleString()}회</strong><br>추탈 적용 실제 소환: <strong>${exp.toLocaleString()}회</strong><br>예상 비용 (100 고정): <strong>${formatNum(exp * 100)}</strong>`;
                drawRarity('rarity-pet', tar, petRarity, RarityNames, RarityColors);
            } else {
                let curr = parseCurrency(document.getElementById('p-curr').value);
                let pullsAvail = Math.floor(curr / 100) * (1 + ext / 100);
                let totalAvail = pullsAvail + prog;
                
                let level = cur;
                let needNext = (level - 1 < petData.length ? petData[level - 1] : 23);
                
                while (totalAvail >= needNext && level < 200) {
                    totalAvail -= needNext;
                    level++;
                    needNext = (level - 1 < petData.length ? petData[level - 1] : 23);
                }
                res.innerHTML = `[보유 재화 소진 시] 도달 가능 최대 레벨: <strong>${level}레벨</strong><br>남은 횟수(진행도): <strong>${Math.floor(totalAvail)} / ${needNext}</strong>`;
                drawRarity('rarity-pet', level, petRarity, RarityNames, RarityColors);
            }
            
        } else if (type === 'mount') {
            let ext = val('m-ext');
            let cost = val('m-cost');
            
            if (isTarget) {
                let tar = val('m-tar');
                if (cur >= tar) return res.innerHTML = `<span style="color:#ed4245; font-weight:bold;">목표 레벨은 현재 레벨보다 커야 합니다.</span>`;
                
                let n = Math.max(0, ((tar - cur) * 20) - prog);
                let exp = Math.ceil(n / (1 + ext / 100));
                
                res.innerHTML = `[목표 ${tar}레벨] 순수 필요 소환: <strong>${n.toLocaleString()}회</strong><br>추탈 적용 실제 소환: <strong>${exp.toLocaleString()}회</strong><br>예상 소모 비용: <strong>${formatNum(exp * cost)}</strong>`;
                drawRarity('rarity-mount', tar, mountRarity, RarityNames, RarityColors);
            } else {
                let curr = parseCurrency(document.getElementById('m-curr').value);
                let pullsAvail = Math.floor(curr / cost) * (1 + ext / 100);
                let totalAvail = pullsAvail + prog;
                
                let levelGained = Math.floor(totalAvail / 20);
                let level = cur + levelGained;
                let leftover = totalAvail % 20;
                
                res.innerHTML = `[보유 재화 소진 시] 도달 가능 최대 레벨: <strong>${level}레벨</strong><br>남은 횟수(진행도): <strong>${Math.floor(leftover)} / 20</strong>`;
                drawRarity('rarity-mount', level, mountRarity, RarityNames, RarityColors);
            }
        }
    }

    function calcForge() {
        let res = document.getElementById('res-forge');
        let cur = val('f-cur');
        let dis = 1 - (val('f-dis') / 100);
        let spd = 1 + (val('f-spd') / 100);
        
        res.style.display = 'block';
        document.getElementById('rarity-forge').style.display = 'none';
        
        if (cur < 1 || cur > 35) return res.innerHTML = `<span style="color:#ed4245; font-weight:bold;">현재 레벨을 올바르게 입력하세요 (1~35).</span>`;

        if (currentMode === 'target') {
            let tar = val('f-tar');
            if (tar > 36 || cur >= tar) return res.innerHTML = `<span style="color:#ed4245; font-weight:bold;">목표 레벨을 올바르게 입력하세요 (현재보다 크고 36 이하).</span>`;
            
            let c = 0, t = 0, s = 0;
            for (let i = cur - 1; i < tar - 1 && i < forgeBase.length; i++) {
                c += forgeBase[i].c; t += forgeBase[i].t; s += forgeBase[i].s;
            }
            
            res.innerHTML = `[목표 ${tar}레벨] 소모 코인 (비감 적용): <strong>${formatNum(Math.floor(c * dis))}</strong><br>건뛰 소모 비용: <strong>${s.toLocaleString()}</strong><br>최종 소요 시간 (시감 적용): <strong>${formatTime(t / spd)}</strong>`;
            drawRarity('rarity-forge', tar, forgeRarity, ForgeNames, ForgeColors);
            
        } else {
            let curr = parseCurrency(document.getElementById('f-curr').value);
            let level = cur;
            let timeAccum = 0;
            let costAccum = 0;
            
            while (level < 36) {
                let nextCost = Math.floor(forgeBase[level - 1].c * dis);
                if (curr >= nextCost) {
                    curr -= nextCost;
                    costAccum += nextCost;
                    timeAccum += forgeBase[level - 1].t;
                    level++;
                } else {
                    break;
                }
            }
            
            res.innerHTML = `[보유 코인 소진 시] 도달 가능 최대 레벨: <strong>${level}레벨</strong><br>총 소모 코인: <strong>${formatNum(costAccum)}</strong><br>사용 후 남은 코인: <strong>${formatNum(curr)}</strong><br>총 소요 시간: <strong>${formatTime(timeAccum / spd)}</strong>`;
            drawRarity('rarity-forge', level, forgeRarity, ForgeNames, ForgeColors);
        }
    }
