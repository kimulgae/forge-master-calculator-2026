<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>승천 계산기</title>
    
    <!-- Supabase 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 분리된 CSS 파일 연결 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
        <span class="nav-title">FMcalc</span>
    </nav>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        
        <div id="auth-container" style="padding: 15px 20px; border-bottom: 1px solid #3f4147;">
            <button id="login-btn" onclick="signInWithGoogle()" style="width: 100%; padding: 12px; background: #ffffff; color: #3c4043; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; display: flex; justify-content: center; align-items: center; gap: 10px;">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google 로그인
            </button>
            <div id="user-info" style="display: none;">
                <span id="user-name" style="color: #fff; display: block; margin-bottom: 10px; font-weight: bold;"></span>
                <button onclick="openTechModal()" style="width: 100%; padding: 10px; background: #5865F2; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 8px; font-weight: bold;">⚙️ 내 기술트리 설정</button>
                <button onclick="signOut()" style="width: 100%; padding: 10px; background: #3f4147; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">로그아웃</button>
            </div>
        </div>
        <a href="index.html" class="sidebar-link active">🚀 승천 계산기</a>
        <a href="guildwar.html" class="sidebar-link">⚔️ 길드전 계산기</a>
    </div>
<div class="container">
    <h1>승천 계산기</h1>
    <p class="subtitle"></p>

    <div class="mode-switch">
        <label class="mode-label active" id="lbl-target">
            <input type="radio" name="calcMode" value="target" checked onchange="toggleMode()">
            <span>🎯 목표 레벨 기준</span>
        </label>
        <label class="mode-label" id="lbl-curr">
            <input type="radio" name="calcMode" value="curr" onchange="toggleMode()">
            <span>💰 보유 재화 기준</span>
        </label>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn active" id="btn-skill" onclick="tab('skill')">🎟️ 스킬</button>
        <button class="nav-btn" id="btn-pet" onclick="tab('pet')">🥚 알</button>
        <button class="nav-btn" id="btn-mount" onclick="tab('mount')">🗝️ 탈것</button>
        <button class="nav-btn" id="btn-forge" onclick="tab('forge')">⚒️ 대장간</button>
    </div>

    <!-- 스킬 계산기 -->
    <div id="card-skill" class="card active">
        <h2>🎟️ 스킬 승천 계산기</h2>
        <div class="input-grid">
            <div class="input-group"><label>현재 레벨</label><input type="number" id="s-cur" placeholder="1" data-default="1" onfocus="this.placeholder=''" onblur="this.placeholder='1'"></div>
            <div class="input-group mode-target"><label>목표 레벨</label><input type="number" id="s-tar" placeholder="100" data-default="100" onfocus="this.placeholder=''" onblur="this.placeholder='100'"></div>
            <div class="input-group mode-curr" style="display:none;"><label>보유 재화 (k 입력 가능)</label><input type="text" id="s-curr" placeholder="예: 30000, 30k" data-default="예: 30000, 30k" onfocus="this.placeholder=''" onblur="this.placeholder='예: 30000, 30k'" onkeyup="formatInput(this)"></div>
            <div class="input-group"><label>진행도 (사용한 횟수)</label><input type="number" id="s-prog" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'"></div>
            <div class="input-group"><label>5회 소환 비용</label><input type="number" id="s-cost" placeholder="200" data-default="200" onfocus="this.placeholder=''" onblur="this.placeholder='200'"></div>
        </div>
        <button class="calc-btn" onclick="calc('skill')">계산하기</button>
        <div class="result-box" id="res-skill"></div>
        <div class="rarity-container" id="rarity-skill"></div>
    </div>

    <!-- 펫 계산기 -->
    <div id="card-pet" class="card">
        <h2>🥚 알 승천 계산기</h2>
        <div class="input-grid">
            <div class="input-group"><label>현재 레벨</label><input type="number" id="p-cur" placeholder="1" data-default="1" onfocus="this.placeholder=''" onblur="this.placeholder='1'"></div>
            <div class="input-group mode-target"><label>목표 레벨</label><input type="number" id="p-tar" placeholder="100" data-default="100" onfocus="this.placeholder=''" onblur="this.placeholder='100'"></div>
            <div class="input-group mode-curr" style="display:none;"><label>보유 재화 (k 입력 가능)</label><input type="text" id="p-curr" placeholder="예: 30000, 30k" data-default="예: 30000, 30k" onfocus="this.placeholder=''" onblur="this.placeholder='예: 30000, 30k'" onkeyup="formatInput(this)"></div>
            <div class="input-group"><label>진행도 (사용한 횟수)</label><input type="number" id="p-prog" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'"></div>
            <div class="input-group"><label>추가 획득 확률(추탈) %</label><input type="number" id="p-ext" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'"></div>
        </div>
        <button class="calc-btn" onclick="calc('pet')">계산하기</button>
        <div class="result-box" id="res-pet"></div>
        <div class="rarity-container" id="rarity-pet"></div>
    </div>

    <!-- 탈것 계산기 -->
    <div id="card-mount" class="card">
        <h2>🗝️ 탈것 승천 계산기</h2>
        <div class="input-grid">
            <div class="input-group"><label>현재 레벨</label><input type="number" id="m-cur" placeholder="1" data-default="1" onfocus="this.placeholder=''" onblur="this.placeholder='1'"></div>
            <div class="input-group mode-target"><label>목표 레벨</label><input type="number" id="m-tar" placeholder="100" data-default="100" onfocus="this.placeholder=''" onblur="this.placeholder='100'"></div>
            <div class="input-group mode-curr" style="display:none;"><label>보유 재화 (k 입력 가능)</label><input type="text" id="m-curr" placeholder="예: 30000, 30k" data-default="예: 30000, 30k" onfocus="this.placeholder=''" onblur="this.placeholder='예: 30000, 30k'" onkeyup="formatInput(this)"></div>
            <div class="input-group"><label>진행도 (사용한 횟수)</label><input type="number" id="m-prog" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'"></div>
            <div class="input-group"><label>추가 획득 확률(추탈) %</label><input type="number" id="m-ext" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'"></div>
            <div class="input-group full-width"><label>1회 소환 비용</label><input type="number" id="m-cost" placeholder="50" data-default="50" onfocus="this.placeholder=''" onblur="this.placeholder='50'"></div>
        </div>
        <button class="calc-btn" onclick="calc('mount')">계산하기</button>
        <div class="result-box" id="res-mount"></div>
        <div class="rarity-container" id="rarity-mount"></div>
    </div>

    <!-- 대장간 계산기 -->
    <div id="card-forge" class="card">
        <h2>⚒️ 대장간 승천 계산기</h2>
        <div class="input-grid">
            <div class="input-group"><label>현재 레벨</label><input type="number" id="f-cur" placeholder="1" data-default="1" onfocus="this.placeholder=''" onblur="this.placeholder='1'"></div>
            <div class="input-group mode-target"><label>목표 레벨 (Max 36)</label><input type="number" id="f-tar" placeholder="35" data-default="35" onfocus="this.placeholder=''" onblur="this.placeholder='35'"></div>
            <div class="input-group mode-curr" style="display:none;"><label>보유 코인 (k, m 입력 가능)</label><input type="text" id="f-curr" placeholder="예: 1500000, 1.5m" data-default="예: 1500000, 1.5m" onfocus="this.placeholder=''" onblur="this.placeholder='예: 1500000, 1.5m'" onkeyup="formatInput(this)"></div>
            <div class="input-group"><label>시간 감소율(시감) %</label><input type="number" id="f-spd" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'"></div>
            <div class="input-group"><label>비용 감소율(비감) %</label><input type="number" id="f-dis" placeholder="0" data-default="0" onfocus="this.placeholder=''" onblur="this.placeholder='0'"></div>
        </div>
        <button class="calc-btn" onclick="calcForge()">계산하기</button>
        <div class="result-box" id="res-forge"></div>
        <div class="rarity-container" id="rarity-forge"></div>
    </div>
</div>

<!-- 분리된 JS 파일 연결 (반드시 body 끝나기 직전에 위치!) -->
<script src="ascension.js"></script>
</body>
</html>
