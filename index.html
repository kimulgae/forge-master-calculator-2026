<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포마 승천 통합 계산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #313338; color: #dbdee1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        h1 { color: #ffffff; text-align: center; margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { color: #949ba4; text-align: center; margin-bottom: 25px; font-size: 0.95rem; }
        
        .nav-buttons { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { flex: 1; min-width: 120px; padding: 14px; background-color: #4e5058; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.05rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .nav-btn.active { background-color: #3c45a5; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3); }

        .card { background-color: #2b2d31; border-radius: 12px; padding: 25px; border-top: 4px solid #5865F2; display: none; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card.active { display: block; }
        #card-skill { border-top-color: #e74c3c; }
        #card-pet { border-top-color: #f1c40f; }
        #card-mount { border-top-color: #9b59b6; }
        #card-forge { border-top-color: #e67e22; }

        .card h2 { margin-top: 0; color: #ffffff; border-bottom: 1px solid #3f4147; padding-bottom: 15px; margin-bottom: 20px; font-size: 1.3rem; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.95rem; font-weight: 600; color: #b5bac1; }
        .input-group input { width: 100%; padding: 12px; background-color: #1e1f22; border: 1px solid #1e1f22; border-radius: 8px; color: #dbdee1; box-sizing: border-box; font-size: 1rem; }
        .input-group input:focus { outline: none; border-color: #5865F2; }
        .full-width { grid-column: span 2; }
        
        .calc-btn { width: 100%; padding: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .calc-btn:hover { background-color: #27ae60; }
        
        .result-box { margin-top: 25px; padding: 20px; background-color: #1e1f22; border-radius: 8px; border-left: 4px solid #5865F2; display: none; line-height: 1.7; font-size: 1.05rem; }
        .result-box strong { color: #5865F2; font-size: 1.15rem; }

        .rarity-container { margin-top: 20px; display: none; }
        .rarity-title { margin-top: 20px; margin-bottom: 10px; font-weight: bold; color: #fff; font-size: 1.1rem; border-bottom: 1px solid #3f4147; padding-bottom: 5px; }
        .rarity-table { display: grid; gap: 6px; }
        .rarity-row { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 6px; font-weight: bold; }
    </style>
</head>

        var g = parseInt(hexcolor.substr(2,2),16);

    function formatTime(s) {
        if (s <= 0) return "0분";
        let d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
        let res = [];
        if (d > 0) res.push(`${d}일`);
        if (h > 0) res.push(`${h}시간`);
        if (m > 0 || res.length === 0) res.push(`${m}분`);
        return res.join(' ');
    }

    function tab(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('card-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function val(id) { return parseFloat(document.getElementById(id).value) || 0; }

    function drawRarity(targetId, level, probData, names, colors) {
        let box = document.getElementById(targetId);
        let idx = Math.min(level - 1, probData.length - 1);
        let probs = probData[idx];
        
        let html = `<div class="rarity-title">목표 레벨(${level}) 출현 확률</div><div class="rarity-table">`;
        for (let i = 0; i < probs.length; i++) {
            if (probs[i] > 0) {
                let textColor = getContrastYIQ(colors[i]);
                html += `<div class="rarity-row" style="background-color:${colors[i]}; color:${textColor}">
                            <span>${names[i]} ☆</span>
                            <span>${probs[i].toFixed(2)}%</span>
                         </div>`;
            }
        }
        html += '</div>';
        box.innerHTML = html;
        box.style.display = 'block';
    }

    function calc(type) {
        let res = document.getElementById('res-' + type);
        res.style.display = 'block';
        document.getElementById('rarity-' + type).style.display = 'none';

        let cur = val(type.charAt(0) + '-cur');
        let tar = val(type.charAt(0) + '-tar');
        let prog = val(type.charAt(0) + '-prog');
        let money = val(type.charAt(0) + '-currency');

        if (cur <= 0) {
            res.innerHTML = `<span style="color:#ed4245; font-weight:bold;">현재 레벨을 올바르게 입력하세요.</span>`;
            return;
        }

        let resultHTML = "";

        if (type === 'skill') {
            let s_cost = val('s-cost');
            
            // 1. 목표 레벨까지 비용 계산
            if (tar > cur) {
                let targetSummons = 0;
                for (let i = cur - 1; i < tar - 1; i++) targetSummons += (i < skillData.length ? skillData[i] : 110);
                targetSummons = Math.max(0, targetSummons - prog);
                let targetCost = Math.ceil(targetSummons / 5) * s_cost;
                resultHTML += `[목표 <strong>${tar}</strong>레벨] 필요 소환: <strong>${targetSummons.toLocaleString()}회</strong><br>예상 소모 비용: <strong>${formatNum(targetCost)}</strong><br><hr style="border:0; border-top:1px solid #3f4147; margin: 15px 0;">`;
                drawRarity('rarity-skill', tar, skillRarity, RarityNames, RarityColors);
            }

            // 2. 보유 재화로 최대 도달 레벨 계산 (만렙 100 제한 적용)
            if (money > 0) {
                let maxLvl = cur;
                let availableSummons = Math.floor(money / s_cost) * 5 + prog;
                while(maxLvl < 100) {
                    let req = (maxLvl - 1 < skillData.length) ? skillData[maxLvl - 1] : 110;
                    if (availableSummons >= req) {
                        availableSummons -= req;
                        maxLvl++;
                    } else {
                        break;
                    }
                }
                
                if (maxLvl >= 100) {
                    resultHTML += `[보유 재화 소진 시] 도달 가능 최대 레벨: <strong>100레벨 (만렙)</strong>`;
                    drawRarity('rarity-skill', 100, skillRarity, RarityNames, RarityColors);
                } else {
                    resultHTML += `[보유 재화 소진 시] 도달 가능 최대 레벨: <strong>${maxLvl}레벨</strong>`;
                    drawRarity('rarity-skill', maxLvl, skillRarity, RarityNames, RarityColors);
                }
            }
            res.innerHTML = resultHTML;

        } else if (type === 'pet') {
            let ext = val('p-ext');
            
            // 1. 목표 레벨까지 비용 계산
            if (tar > cur) {
                let targetSummons = 0;
                for (let i = cur - 1; i < tar - 1; i++) targetSummons += (i < petData.length ? petData[i] : 23);
                targetSummons = Math.max(0, targetSummons - prog);
                let expectedSummons = Math.ceil(targetSummons / (1 + ext / 100));
                let targetCost = expectedSummons * 100;
                resultHTML += `[목표 <strong>${tar}</strong>레벨] 필요 소환: <strong>${targetSummons.toLocaleString()}회</strong><br>예상 소모 비용: <strong>${formatNum(targetCost)}</strong> (비용 100 고정)<br><hr style="border:0; border-top:1px solid #3f4147; margin: 15px 0;">`;
                drawRarity('rarity-pet', tar, petRarity, RarityNames, RarityColors);
            }

            // 2. 보유 재화로 최대 도달 레벨 계산 (만렙 100 제한 적용)
            if (money > 0) {
                let maxLvl = cur;
                let currentMoney = money;
                let p_prog = prog;
                while(maxLvl < 100) {
                    let req = (maxLvl - 1 < petData.length) ? petData[maxLvl - 1] : 23;
                    let req_after_prog = Math.max(0, req - p_prog);
                    let cost = Math.ceil(req_after_prog / (1 + ext / 100)) * 100;
                    
                    if (currentMoney >= cost && cost > 0) {
                        currentMoney -= cost;
                        maxLvl++;
                        p_prog = 0;
                    } else if (cost === 0 && p_prog >= req) {
                        p_prog -= req;
                        maxLvl++;
                    } else {
                        break;
                    }
                }
                
                if (maxLvl >= 100) {
                    resultHTML += `[보유 재화 소진 시] 도달 가능 최대 레벨: <strong>100레벨 (만렙)</strong>`;
                    drawRarity('rarity-pet', 100, petRarity, RarityNames, RarityColors);
                } else {
                    resultHTML += `[보유 재화 소진 시] 도달 가능 최대 레벨: <strong>${maxLvl}레벨</strong>`;
                    drawRarity('rarity-pet', maxLvl, petRarity, RarityNames, RarityColors);
                }
            }
            res.innerHTML = resultHTML;

        } else if (type === 'mount') {
            let ext = val('m-ext');
            let m_cost = val('m-cost');

            // 1. 목표 레벨까지 비용 계산
            if (tar > cur) {
                let targetSummons = Math.max(0, ((tar - cur) * 20) - prog);
                let expectedSummons = Math.ceil(targetSummons / (1 + ext / 100));
                let targetCost = expectedSummons * m_cost;
                resultHTML += `[목표 <strong>${tar}</strong>레벨] 필요 소환: <strong>${targetSummons.toLocaleString()}회</strong><br>예상 소모 비용: <strong>${formatNum(targetCost)}</strong><br><hr style="border:0; border-top:1px solid #3f4147; margin: 15px 0;">`;
                drawRarity('rarity-mount', tar, mountRarity, RarityNames, RarityColors);
            }

            // 2. 보유 재화로 최대 도달 레벨 계산 (만렙 100 제한 적용)
            if (money > 0) {
                let maxLvl = cur;
                let currentMoney = money;
                let m_prog = prog;
                while(maxLvl < 100) {
                    let req = 20;
                    let req_after_prog = Math.max(0, req - m_prog);
                    let cost = Math.ceil(req_after_prog / (1 + ext / 100)) * m_cost;
                    
                    if (currentMoney >= cost && cost > 0) {
                        currentMoney -= cost;
                        maxLvl++;
                        m_prog = 0;
                    } else if (cost === 0 && m_prog >= req) {
                        m_prog -= req;
                        maxLvl++;
                    } else {
                        break;
                    }
                }
                
                if (maxLvl >= 100) {
                    resultHTML += `[보유 재화 소진 시] 도달 가능 최대 레벨: <strong>100레벨 (만렙)</strong>`;
                    drawRarity('rarity-mount', 100, mountRarity, RarityNames, RarityColors);
                } else {
                    resultHTML += `[보유 재화 소진 시] 도달 가능 최대 레벨: <strong>${maxLvl}레벨</strong>`;
                    drawRarity('rarity-mount', maxLvl, mountRarity, RarityNames, RarityColors);
                }
            }
            res.innerHTML = resultHTML;
            
        } else if (type === 'forge') {
            let tar = val('f-tar');
            let dis = 1 - (val('f-dis') / 100);
            let spd = 1 + (val('f-spd') / 100);
            
            if (cur < 1 || tar > 35 || cur >= tar) {
                res.style.display = 'block';
                return res.innerHTML = `<span style="color:#ed4245; font-weight:bold;">목표 레벨을 현재 레벨보다 크게 입력하세요 (최대 35).</span>`;
            }

            // 1. 목표 레벨까지 코인 계산
            let c = 0, t = 0, s = 0;
            for (let i = cur - 1; i < tar - 1 && i < forgeBase.length; i++) {
                c += forgeBase[i].c; t += forgeBase[i].t; s += forgeBase[i].s;
            }
            
            let totalCost = Math.floor(c * dis);
            resultHTML += `[목표 <strong>${tar}</strong>레벨] 필요 코인 (비감 적용): <strong>${formatNum(totalCost)}</strong><br>건뛰 소모 비용: <strong>${s.toLocaleString()}</strong><br>최종 소요 시간: <strong>${formatTime(t / spd)}</strong><br><hr style="border:0; border-top:1px solid #3f4147; margin: 15px 0;">`;
            drawRarity('rarity-forge', tar, forgeRarity, ForgeNames, ForgeColors);

            // 2. 보유 코인으로 최대 도달 레벨 계산 (만렙 35 제한 적용)
            if (money > 0) {
                let maxLvl = cur;
                let currentMoney = money;
                
                for (let i = cur - 1; i < 34; i++) { // 인덱스 33까지가 34->35 레벨업 비용
                    let cost = Math.floor(forgeBase[i].c * dis);
                    if (currentMoney >= cost) {
                        currentMoney -= cost;
                        maxLvl++;
                    } else {
                        break;
                    }
                }
                
                if (maxLvl >= 35) {
                    resultHTML += `[보유 코인 소진 시] 도달 가능 최대 레벨: <strong>35레벨 (만렙)</strong>`;
                    drawRarity('rarity-forge', 35, forgeRarity, ForgeNames, ForgeColors);
                } else {
                    resultHTML += `[보유 코인 소진 시] 도달 가능 최대 레벨: <strong>${maxLvl}레벨</strong>`;
                    drawRarity('rarity-forge', maxLvl, forgeRarity, ForgeNames, ForgeColors);
                }
            }
            res.innerHTML = resultHTML;
        }
    }
</script>
