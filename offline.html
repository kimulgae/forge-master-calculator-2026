<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>대장간 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <div style="display: flex; align-items: center;">
            <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
            <span class="nav-title">FMcalc</span>
        </div>
        <div class="top-right-auth">
            <button id="login-btn-top" onclick="signInWithGoogle()" class="top-login-btn">
                <span>로그인</span>
            </button>
            <div id="user-info-top" style="display: none; position: relative;">
                <img id="profile-img" src="" alt="프로필" onclick="toggleProfileMenu()" class="profile-avatar">
                <div id="profile-menu-top" class="profile-dropdown">
                    <div class="dropdown-header">
                        <span style="font-size: 0.8rem; color: #949ba4;">사용자</span><br>
                        <strong id="user-name-top" style="font-size: 1.1rem; color: #fff;"></strong>
                    </div>
                    <ul class="dropdown-list">
                        <li onclick="location.href='settings.html'">⚙️ 프로필 설정</li>
                        <div class="dropdown-divider"></div>
                        <li onclick="signOut()">🚪 로그아웃</li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <a href="index.html" class="sidebar-link">🚀 승천 계산기</a>
        <a href="guildwar.html" class="sidebar-link">⚔️ 길드전 계산기</a>
        <a href="pvp.html" class="sidebar-link">🔥 PvP 계산기</a>
        <a href="offline.html" class="sidebar-link active">💤 오프라인 계산기</a>
        <a href="settings.html" class="sidebar-link">⚙️ 프로필 설정</a>
    </div>

    <div class="container">
        <h1>대장간 계산기</h1>
        <p class="subtitle">모루 타격 횟수와 오프라인 누적 시간을 최적화하세요.</p>

        <div class="card active" style="display: block; border-top-color: #3498db;">
            <h2>📊 내 스펙 입력</h2>
            <div class="input-grid">
                <div class="input-group">
                    <label>보유 망치 개수</label>
                    <input type="number" id="hammerCount" value="1000">
                </div>
                <div class="input-group">
                    <label>무료 모루질 확률 (%)</label>
                    <input type="number" id="freeSummonPercent" value="10" step="0.1">
                </div>
                <div class="input-group">
                    <label>모루 속도 스피드 테크 (0~50)</label>
                    <input type="number" id="forgeSpeedTech" value="0">
                </div>
                <div class="input-group">
                    <label>오프라인 누적 테크 (0~25)</label>
                    <input type="number" id="offlineTech" value="0">
                </div>
            </div>
            
            <button class="calc-btn" onclick="fetchCalculation()" style="margin-top: 10px; background-color: #3498db; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);">
                🛠️ 서버 연산하기
            </button>
            
            <div class="result-box" id="res-box" style="border-left-color: #3498db;"></div>
        </div>
    </div>

    <script src="offline.js"></script>
</body>
</html>
