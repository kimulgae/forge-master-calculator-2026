<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>프로필 설정 - 포마 종합 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <div style="display: flex; align-items: center;">
            <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
            <span class="nav-title">포마 종합 계산기</span>
        </div>
        <div class="top-right-auth">
            <button id="login-btn-top" onclick="signInWithGoogle()" class="top-login-btn">
                <span>로그인</span>
            </button>
            <div id="user-info-top" style="display: none; position: relative;">
                <img id="profile-img" src="" alt="프로필" onclick="toggleProfileMenu()" class="profile-avatar">
                <div id="profile-menu-top" class="profile-dropdown">
                    <div class="dropdown-header">
                        <span style="font-size: 0.8rem; color: #949ba4;">사용자</span><br>
                        <strong id="user-name-top" style="font-size: 1.1rem; color: #fff;"></strong>
                    </div>
                    <ul class="dropdown-list">
                        <li onclick="location.href='settings.html'">⚙️ 프로필 설정</li>
                        <div class="dropdown-divider"></div>
                        <li onclick="signOut()">🚪 로그아웃</li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <a href="index.html" class="sidebar-link">🚀 승천 계산기</a>
        <a href="guildwar.html" class="sidebar-link">⚔️ 길드전 계산기</a>
        <a href="settings.html" class="sidebar-link active">⚙️ 프로필 설정</a>
    </div>

    <div class="container">
        <h1>프로필 설정</h1>
        <p class="subtitle">계산기에 자동으로 적용될 나의 기본 스펙을 저장해두세요.</p>

        <div class="card active" style="display: block;">
            <h2>⚙️ 내 기술트리 및 기초스탯</h2>
           <div class="input-grid">
            <div class="input-group"><label>대장간 비용감소(%)</label><input type="number" id="db-forge-dis"></div>
            <div class="input-group"><label>대장간 시간감소(%)</label><input type="number" id="db-forge-spd"></div>
            <div class="input-group"><label>스킬 소환비용</label><input type="number" id="db-skill-cost"></div>
            <div class="input-group"><label>탈것 소환비용</label><input type="number" id="db-mount-cost"></div>
            
            <div class="input-group"><label>탈것 추탈(%)</label><input type="number" id="db-mount-ext"></div>
            <div class="input-group"><label>펫(알) 추탈(%)</label><input type="number" id="db-pet-ext"></div>
            
            <div class="input-group"><label>무료 망치 확률(%)</label><input type="number" id="db-free-hammer"></div>
        </div>
            <button onclick="saveTechTree()" class="calc-btn" style="margin-top: 15px;">💾 저장 및 연동하기</button>
        </div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
